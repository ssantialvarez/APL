name: Bash CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
     steps:
      - uses: actions/checkout@v3
        with:
          submodules: true   

      - name: Run Bats tests
        run: ./test/bats/bin/bats test/test.bats
