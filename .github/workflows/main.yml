name: Bash CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run tests
        run: ./test/bats/bin/bats test/test.bats
